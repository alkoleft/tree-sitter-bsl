plugins {
    id 'java-library'
}

group = 'org.treesitter'
version = '0.1.5'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.treesitter:jtreesitter:0.24.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

sourceSets {
    main {
        java {
            srcDirs = ['.']
        }
    }
}
